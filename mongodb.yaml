version: "3.8"

services:
  mongo:
    image: mongo
    ports:
    - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: qwerty
    volumes:                                                        # FOR MOUNTING THE VOLUME TO PERSIST THE DATA
    - "/Users/gajendra/Desktop/SEM 6/docker-testapp/mongo_database:/data/db"


  mongo-express:
    image: mongo-express
    ports: 
    - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: qwerty
      ME_CONFIG_MONGODB_URL: mongodb://admin:qwerty@mongo:27017/


## docker compose commands:

# 1. to create and run the containers:
# docker compose -f mongodb.yaml up -d

# 2. to delete the container permanatly
# docker compose -f mongodb.yaml down

